name: Insurance CRM
version: "1.31.3"
tagline: Advanced insurance management and client relationship platform
description: >-
  A comprehensive, self-hosted insurance management CRM built for
  brokers, underwriters, and insurance teams. Manage clients, policies,
  claims, quotes, and renewals all in one place.

  Features include team-based multi-tenancy with hierarchical teams,
  role-based access control, automated policy expiration reminders,
  workflow automation, cyber risk assessments, AI-powered document
  analysis, encrypted data storage, and a full client portal.

  Built with a modern React frontend and Express.js backend, the
  system supports comprehensive audit trails, GDPR compliance tools,
  and integrates with Companies House for business verification.
  Everything runs locally on your Umbrel with a SQLite database —
  no external services required.
