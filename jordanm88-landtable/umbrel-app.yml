manifestVersion: 1
id: jordanm88-landtable
category: productivity
name: Landtable
version: "0.9.7"
logo: https://images-jm.b-cdn.net/images/favicon.svg
tagline: Self-hosted spreadsheet/database — your tables, your server
description: >-
  Landtable is a self-hosted spreadsheet-meets-database app: workspaces,
  bases, tables, rich field types, formulas, views, charts, automations,
  forms and more — running entirely on your own hardware with a local
  SQLite database.

  The first user to register is granted admin rights automatically.
  All required secrets (JWT signing key, encryption-at-rest key) are
  generated on first boot and persisted to the app's data volume so they
  remain stable across container restarts.
