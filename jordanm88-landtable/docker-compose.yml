version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: jordanm88-landtable_app_1
      APP_PORT: 3001
      PROXY_AUTH_ADD: "false"

  app:
    image: ghcr.io/jordanm88/landtable:latest
    restart: on-failure
    stop_grace_period: 1m
    user: "1000:1000"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: file:/data/landtable.db
