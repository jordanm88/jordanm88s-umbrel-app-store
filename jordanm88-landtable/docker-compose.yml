# Umbrel app bundle template for Landtable.
#
# Copy this file (along with umbrel-app.yml + exports.sh) into your fork of
# https://github.com/getumbrel/umbrel-apps under apps/<your-app-id>/.
#
# IMPORTANT: `environment:` MUST use mapping syntax (KEY: value) — Umbrel's
# compose validator rejects the list form (`- KEY=value`) with:
#   services.app.environment must be a mapping
#
# Replace the digest placeholder with the real multi-arch sha256 from GHCR
# once your image is built (see `docker buildx imagetools inspect ...`).

services:
  app_proxy:
    environment:
      APP_HOST: jordanm88-landtable_app_1
      APP_PORT: 3001
      PROXY_AUTH_ADD: "false"

  app:
    image: ghcr.io/jordanm88/landtable:latest
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: file:/data/landtable.db
      APP_URL: http://${DEVICE_DOMAIN_NAME}:3001
      # JWT_SECRET and ENCRYPTION_KEY are auto-generated by the container's
      # entrypoint on first boot and persisted to /data/.secrets.env so they
      # remain stable across restarts. Override here only if you want to pin
      # specific values.
